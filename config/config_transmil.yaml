model: transmil             
data_dir: /data0/age_predict/preprocessed/coords/features_uni_v2
fold: 0
output_dir: ./experiments/transmil_models

# Training parameters
batch_size: 1
num_epochs: 100
learning_rate: 1e-4
weight_decay: 1e-5
accumulation_steps: 4
num_tissues: 40

# W&B configuration
use_wandb: true
wandb_project: age-predict-transmil
wandb_entity: null 
log_step: 100

# Model parameters
# The original paper uses dim: 512 for its internal hidden size.
model_params:
  in_dim: 1536
  dim: 512
  tissue_embed: false
  nystrom_dim_head: 64
  nystrom_heads: 8
  nystrom_num_landmarks: 256
  nystrom_pinv_iterations: 6
  nystrom_residual: true
  ppeg_kernel_sizes: [7, 5, 3]
  
hydra:
  run:
    dir: experiments/log/runs/${now:%Y-%m-%d}_${now:%H-%M-%S}
  sweep:
    dir: experiments/log/multiruns/${now:%Y-%m-%d}_${now:%H-%M-%S}
    subdir: ${hydra.job.num}
